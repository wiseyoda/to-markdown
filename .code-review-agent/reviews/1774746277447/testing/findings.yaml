findings:
  - category: "testing"
    severity: "medium"
    title: "Dead mocks in CLI smart flag tests patch sync functions instead of async"
    description: >
      Three tests in TestSmartFlags (test_clean_flag_accepted at line 141,
      test_summary_flag_accepted at line 149, test_short_flags_accepted at line 162)
      patch the sync versions of smart functions (to_markdown.smart.clean.clean_content,
      to_markdown.smart.summary.summarize_content) but the pipeline exclusively calls
      their async counterparts (clean_content_async, summarize_content_async) via
      build_content_async in content_builder.py. The mocks are completely inert and
      have zero effect on test execution. The tests pass because LLM calls fail
      gracefully with the fake API key ("test-key") — the LLMError is caught by
      the async smart functions which fall back to original content or return None.
    why: >
      These tests create a false sense that smart feature integration is controlled
      by the mock setup. A developer modifying LLM error handling (e.g., making
      clean_content_async propagate errors instead of catching them) would see these
      tests fail for reasons unrelated to the declared mock. Additionally, when
      google-genai is installed, these tests silently make real HTTP calls to the
      Gemini API, making them network-dependent and non-deterministic in environments
      with connectivity issues.
    file: "tests/test_cli.py"
    line: 141
    confidence: 88
    suggestedFix: >
      Patch the async functions that the pipeline actually calls, or patch at the
      pipeline level to avoid network calls entirely:

      def test_clean_flag_accepted(self, sample_text_file: Path):
          with (
              patch.dict("os.environ", {"GEMINI_API_KEY": "test-key"}),
              patch("to_markdown.smart.clean.clean_content_async",
                    new_callable=AsyncMock, return_value="cleaned"),
          ):
              result = runner.invoke(app, [str(sample_text_file), "--clean"])
              assert result.exit_code == EXIT_SUCCESS

      def test_summary_flag_accepted(self, sample_text_file: Path):
          with (
              patch.dict("os.environ", {"GEMINI_API_KEY": "test-key"}),
              patch("to_markdown.smart.summary.summarize_content_async",
                    new_callable=AsyncMock, return_value=None),
          ):
              result = runner.invoke(app, [str(sample_text_file), "--summary"])
              assert result.exit_code == EXIT_SUCCESS
    codeSnippet: >
      def test_clean_flag_accepted(self, sample_text_file: Path):
          with (
              patch.dict("os.environ", {"GEMINI_API_KEY": "test-key"}),
              patch("to_markdown.smart.clean.clean_content", return_value="cleaned"),
          ):
              result = runner.invoke(app, [str(sample_text_file), "--clean"])
              assert result.exit_code == EXIT_SUCCESS

      def test_summary_flag_accepted(self, sample_text_file: Path):
          with (
              patch.dict("os.environ", {"GEMINI_API_KEY": "test-key"}),
              patch("to_markdown.smart.summary.summarize_content", return_value=None),
          ):
              result = runner.invoke(app, [str(sample_text_file), "--summary"])
              assert result.exit_code == EXIT_SUCCESS

  - category: "testing"
    severity: "low"
    title: "Missing error path test for OCR retry failure in extract_file"
    description: >
      The _retry_with_ocr function in extraction.py (line 116) catches KreuzbergError
      and returns None when OCR retry fails. The extract_file function (line 76) handles
      this None by keeping the original sparse extraction result. Three OCR fallback tests
      exist (test_ocr_fallback_produces_better_content, test_ocr_fallback_not_triggered_for_good_extraction,
      test_ocr_fallback_keeps_original_if_retry_worse) but all mock the second
      extract_file_sync call to return a successful result. No test covers the case where
      the OCR retry itself raises KreuzbergError, which exercises a distinct code branch
      (the retry_result is None check at line 76 vs the content length comparison at line 76-79).
    why: >
      OCR retry failure is a realistic scenario — Tesseract may not be installed, OCR may
      time out on complex documents, or the file may be corrupted in a way that only affects
      OCR. Without a test, a regression in the None-handling logic (e.g., accidentally
      removing the None check) would go undetected. The existing tests only exercise the
      "retry succeeded but content was worse" branch, not the "retry raised an exception" branch.
    file: "src/to_markdown/core/extraction.py"
    line: 76
    confidence: 90
    suggestedFix: >
      Add a test where the second extract_file_sync call raises KreuzbergError:

      def test_ocr_fallback_retry_failure_keeps_original(self, tmp_path: Path):
          """When OCR retry raises KreuzbergError, keep original extraction."""
          from kreuzberg.exceptions import KreuzbergError as KError
          pdf_file = tmp_path / "ocr_fail.pdf"
          pdf_file.write_bytes(b"%PDF-1.4 fake content")

          sparse_result = SimpleNamespace(
              content="E",
              metadata={"quality_score": 0.1, "format_type": "pdf"},
              tables=[],
              images=[],
          )

          with patch(
              "to_markdown.core.extraction.extract_file_sync",
              side_effect=[sparse_result, KError("Tesseract not found")],
          ):
              result = extract_file(pdf_file)

          assert result.content == "E"
          assert result.metadata.get("ocr_fallback") is None
    codeSnippet: >
      retry_result = _retry_with_ocr(path, extract_images=extract_images)
      if retry_result is not None and len(retry_result.content.strip()) > len(
          result.content.strip()
      ):
          result = retry_result
