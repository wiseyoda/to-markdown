verdict:
  new_findings:
    - category: "code-quality"
      severity: "high"
      title: "str.format() on untrusted document content crashes with KeyError"
      description: >
        The LLM prompt builders in clean.py and summary.py use Python's
        str.format() to embed raw document content into prompt templates. In
        clean.py line 79, CLEAN_PROMPT.format(format_type=format_type,
        content=chunk) passes the extracted document text through the format
        parser. In summary.py lines 30 and 69,
        SUMMARY_PROMPT.format(content=content) does the same. If the document
        content contains curly brace patterns like {variable}, {name}, or {data}
        (common in JSON, code files, API docs, and template files), Python's
        str.format() will raise a KeyError or ValueError. The except clause in
        clean_content_async (line 117) only catches LLMError, not KeyError, so the
        exception propagates up and crashes the conversion.
      why: >
        This crashes the entire conversion pipeline for any document containing
        curly brace patterns — JSON files, source code, template files, and
        technical documentation are all affected. Since --clean is enabled by
        default when a GEMINI_API_KEY is set, this will hit users who haven't
        explicitly opted into smart features. The workaround of catching the error
        in the caller exists but the exception is unhandled at the LLM feature
        level.
      file: "src/to_markdown/smart/clean.py"
      line: 79
      confidence: 95
      suggestedFix: >
        Replace str.format() with string concatenation to avoid parsing content as
        a format string. Split the prompt constant into a prefix that uses
        .format() for format_type only, and append content separately:

        def _build_clean_prompt(chunk: str, format_type: str) -> str:
            prefix = CLEAN_PROMPT_PREFIX.format(format_type=format_type)
            return f"{prefix}\n{chunk}"

        Or use a safer interpolation method like string.Template or f-strings
        where the content variable is not subject to format parsing. Apply the
        same fix to SUMMARY_PROMPT usage in summary.py lines 30 and 69.
      codeSnippet: "return CLEAN_PROMPT.format(format_type=format_type, content=chunk)"
      reasoning: "Verified in source — CLEAN_PROMPT and SUMMARY_PROMPT both contain {content} placeholders passed through str.format(). No existing findings cover this. Crash is deterministic for any input containing curly braces."

    - category: "code-quality"
      severity: "medium"
      title: "Pending tasks leak permanently if spawn_worker fails"
      description: >
        In worker.py spawn_worker (line 43), if subprocess.Popen raises an
        exception (e.g., OSError from resource exhaustion), the task created by
        store.create() at the caller site remains in "pending" status with no PID.
        The orphan detector check_orphans() in tasks.py line 233 only queries
        tasks with status "running", so it never finds stuck pending tasks. The
        cleanup() method only removes tasks in terminal states
        (completed/failed/cancelled). A pending task with no worker process is
        never detected, never cleaned up, and accumulates in the SQLite database
        indefinitely.
      why: >
        Each failed spawn leaves an orphaned database row that is never cleaned
        up. Over time, these accumulate in the task store. Users running --status
        all will see phantom pending tasks that never complete, with no way to
        remove them other than manually editing the SQLite database.
      file: "src/to_markdown/core/tasks.py"
      line: 233
      confidence: 85
      suggestedFix: >
        Extend check_orphans to also detect stale pending tasks. A pending task
        with no PID (or a stale PID) that was created more than a few minutes ago
        is likely orphaned. Alternatively, wrap the spawn_worker call in
        handle_background with try/except that updates the task to failed status
        on spawn failure.
      codeSnippet: "\"SELECT id, pid FROM tasks WHERE status = ?\", (TaskStatus.RUNNING.value,)"
      reasoning: "Verified in source — check_orphans only queries RUNNING status. No code path transitions stale PENDING tasks to a terminal state."

    - category: "testing"
      severity: "medium"
      title: "Missing test for run_worker with nonexistent task ID"
      description: >
        The run_worker() function in worker.py handles the case where
        store.get(task_id) returns None by logging an error and returning early at
        lines 69-71. No test in test_worker.py or any other test file exercises
        this early-return path. All TestRunWorker and TestRunWorkerBatch tests
        create a valid task before calling run_worker, so the None branch is never
        reached.
      why: >
        If someone refactored run_worker to remove the None guard or proceeded
        past it, the function would crash with an AttributeError on
        task.command_args. This path is reachable when a task is deleted between
        spawn and worker execution (cleanup race), or if the worker receives a
        stale/invalid task ID. Without a test, this defensive check could be
        silently removed during refactoring.
      file: "src/to_markdown/core/worker.py"
      line: 69
      confidence: 92
      suggestedFix: |
        Add a test to TestRunWorker in test_worker.py:
        def test_nonexistent_task_returns_gracefully(self, store, store_dir):
            from to_markdown.core.worker import run_worker
            run_worker("nonexistent-id", store)
            assert store.get("nonexistent-id") is None
      codeSnippet: "task = store.get(task_id)\nif task is None:\n    logger.error(...)\n    return"
      reasoning: "Defensive guard at worker entry point has no test coverage. Race condition between spawn and worker start makes this path reachable in production."

    - category: "testing"
      severity: "medium"
      title: "Background worker batch failure path never exercised by tests"
      description: >
        In run_worker() at worker.py lines 129-138, when convert_batch() returns a
        BatchResult with non-empty failed list, the worker sets status to
        TASK_STATUS_FAILED and composes an error string from the failure details.
        No test in test_worker.py or test_fix_background_batch.py exercises this
        branch — all batch worker tests mock convert_batch to return
        successful results with empty failed lists.
      why: >
        When a user runs a background batch conversion and some files fail, they
        check --status to see the outcome. The failure status and error details
        are set in this untested branch. If someone accidentally removed the
        if-result.failed check, background batch failures would be silently
        reported as COMPLETED with no error details, giving users a false sense of
        success.
      file: "src/to_markdown/core/worker.py"
      line: 129
      confidence: 92
      suggestedFix: >
        Add a test to TestRunWorkerBatch in test_worker.py that mocks
        convert_batch to return a BatchResult with a non-empty failed list, then
        asserts the task status is FAILED and the error string contains the
        failure details.
      codeSnippet: "if result.failed:\n    store.update(task_id, status=TASK_STATUS_FAILED, error=...)"
      reasoning: "All existing batch worker tests use successful results. The failure branch sets user-visible error details and is completely untested."

    - category: "documentation"
      severity: "medium"
      title: "Setup wizard suggests --clean explicitly after API key makes it automatic"
      description: >
        In src/to_markdown/core/setup.py line 195, the _print_next_steps()
        function shows "to-markdown file.pdf --clean      Fix extraction
        artifacts" as a suggested command after the user has just configured their
        GEMINI_API_KEY via the --setup wizard. However, per cli.py lines 162-164,
        clean is enabled by default when the API key is set: `effective_clean =
        clean or (not no_clean and _is_llm_available())`. The README correctly
        states "Content cleaning runs automatically when GEMINI_API_KEY is set."
        The wizard's suggestion contradicts this by implying --clean must be
        passed explicitly.
      why: >
        A first-time user who just completed setup will believe --clean is
        required to get content cleaning, when it already happens automatically.
        This creates a wrong mental model of the tool's core feature. Users may
        always pass --clean unnecessarily, and won't understand the --no-clean
        flag's purpose since they think clean is opt-in rather than opt-out.
      file: "src/to_markdown/core/setup.py"
      line: 195
      confidence: 90
      suggestedFix: >
        Replace the --clean line in _print_next_steps with a --no-clean example or
        a note about automatic cleaning. For example:
        "to-markdown file.pdf              Convert with auto-clean"
        "to-markdown file.pdf --no-clean   Skip LLM cleaning"
      codeSnippet: "\"  [cyan]to-markdown file.pdf --clean[/cyan]      Fix extraction artifacts\\n\""
      reasoning: "Verified — setup.py:195 shows --clean as explicit, but cli.py enables clean by default when API key is present. First-time users get a misleading mental model."

    - category: "documentation"
      severity: "low"
      title: "INSTALL.md example output does not match actual installer step text"
      description: >
        INSTALL.md line 72 shows the example terminal output as "[2/7] Checking
        Python 3.13+" but the actual install.sh script at line 66 outputs "[2/7]
        Checking Python 3.14+". A user following the INSTALL.md guide would see
        different step text than what the documentation previews. The installer
        checks for Python 3.14+ first and only falls back to 3.13 if 3.14 is
        unavailable, so the step label "3.14+" reflects the actual check, while
        the documented example says "3.13+".
      why: >
        A non-technical user following the installation guide may worry they have
        the wrong version of the installer or that something went wrong, since the
        terminal output differs from the documented preview. This undermines the
        purpose of including example output in the first place — to set
        expectations.
      file: "INSTALL.md"
      line: 72
      confidence: 95
      suggestedFix: >
        Change INSTALL.md line 72 from "[2/7] Checking Python 3.13+" to
        "[2/7] Checking Python 3.14+" to match what install.sh actually outputs.
        Alternatively, change install.sh to say "Checking Python 3.13+" to match
        pyproject.toml's requires-python = ">=3.13".
      codeSnippet: "[2/7] Checking Python 3.13+"
      reasoning: "Exact string mismatch between documentation and actual script output. Easy fix, clear user impact."

    - category: "style"
      severity: "medium"
      title: "Overloaded validate_api_key name in core/ with incompatible signatures"
      description: >
        Two functions named validate_api_key exist in the same core/ package with
        different signatures and semantics. cli_helpers.py line 45 defines
        validate_api_key(summary: bool, images: bool) -> None which checks if the
        GEMINI_API_KEY environment variable is set and raises typer.Exit on
        failure. setup.py line 87 defines validate_api_key(api_key: str) -> bool
        which makes a live API call to Gemini and returns True/False. Same name,
        different arity, different return type, different behavior.
      why: >
        A developer searching for validate_api_key finds two incompatible
        functions in the same package. Without reading both implementations, they
        cannot know which to call — one validates presence of an env var, the
        other validates a key string against the live API. This ambiguity forces
        unnecessary context switching and increases the risk of calling the wrong
        one.
      file: "src/to_markdown/core/cli_helpers.py"
      line: 45
      confidence: 90
      suggestedFix: >
        Rename cli_helpers.py version to require_api_key(summary, images) -> None
        to distinguish enforcing presence from validating correctness. The setup.py
        version keeps validate_api_key since it truly validates against the API.
      codeSnippet: "def validate_api_key(summary: bool, images: bool) -> None:"
      reasoning: "Same-name functions with incompatible signatures in the same package. Genuine developer confusion risk."

    - category: "style"
      severity: "low"
      title: "Keyword argument order differs between sync/async pair in content_builder.py"
      description: >
        build_content() at line 13 orders its keyword-only parameters as (clean,
        summary, images, sanitize) while build_content_async() at line 37 orders
        them as (sanitize, clean, summary, images). Every other sync/async pair in
        the codebase (convert_file/convert_file_async,
        convert_to_string/convert_to_string_async in pipeline.py) uses identical
        parameter ordering between the two variants.
      why: >
        A developer comparing the sync and async signatures side-by-side would
        expect identical parameter ordering, as established by every other
        sync/async pair in pipeline.py. The reordered sanitize parameter breaks
        this expectation and forces the reader to verify that both functions
        accept the same arguments.
      file: "src/to_markdown/core/content_builder.py"
      line: 39
      confidence: 92
      suggestedFix: |
        Reorder build_content_async parameters to match build_content:
        async def build_content_async(
            input_path: Path,
            *,
            clean: bool = False,
            summary: bool = False,
            images: bool = False,
            sanitize: bool = True,
        ) -> str:
      codeSnippet: "async def build_content_async(\n    input_path: Path,\n    *,\n    sanitize: bool = True,\n    clean: bool = False,"
      reasoning: "Verified — sync version has (clean, summary, images, sanitize), async has (sanitize, clean, summary, images). Breaks established convention from pipeline.py pairs."

    - category: "style"
      severity: "low"
      title: "Task status updates mix string constants and enum .value access"
      description: >
        worker.py references task statuses via string constants imported from
        constants.py (e.g. TASK_STATUS_RUNNING at line 88, TASK_STATUS_COMPLETED
        at line 135, TASK_STATUS_CANCELLED at line 79). Meanwhile background.py
        line 109 and background_tools.py line 165 reference the same values via
        the TaskStatus enum (TaskStatus.CANCELLED.value). Both resolve to the same
        strings, but the access pattern is inconsistent across the three files
        that update task status.
      why: >
        A developer adding new status transitions must choose between two patterns
        with no clear guidance on which is preferred. The mixed usage also makes
        it harder to grep for all places where a specific status is set, since the
        search must account for both TASK_STATUS_CANCELLED and
        TaskStatus.CANCELLED.value.
      file: "src/to_markdown/core/worker.py"
      line: 88
      confidence: 85
      suggestedFix: >
        Standardize on the TaskStatus enum throughout. Change worker.py to import
        TaskStatus from tasks.py and use TaskStatus.RUNNING.value etc. The string
        constants in constants.py can remain for the enum definition only.
      codeSnippet: "store.update(task_id, status=TASK_STATUS_RUNNING, ...)"
      reasoning: "Two access patterns for the same values across three files. Grepability and consistency concern for future contributors."

