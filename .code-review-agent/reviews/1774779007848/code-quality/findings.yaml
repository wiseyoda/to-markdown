findings:
  - category: "code-quality"
    severity: "high"
    title: "str.format() on untrusted document content crashes with KeyError"
    description: >
      The LLM prompt builders in clean.py and summary.py use Python's str.format()
      to embed raw document content into prompt templates. In clean.py line 79,
      CLEAN_PROMPT.format(format_type=format_type, content=chunk) passes the extracted
      document text through the format parser. In summary.py lines 30 and 69,
      SUMMARY_PROMPT.format(content=content) does the same. If the document content
      contains curly brace patterns like {variable}, {name}, or {data} (common in
      JSON, code files, API docs, and template files), Python's str.format() will
      raise a KeyError or ValueError. The except clause in clean_content_async
      (line 117) only catches LLMError, not KeyError, so the exception propagates
      up and crashes the conversion.
    why: >
      This crashes the entire conversion pipeline for any document containing curly
      brace patterns — JSON files, source code, template files, and technical
      documentation are all affected. Since --clean is enabled by default when a
      GEMINI_API_KEY is set, this will hit users who haven't explicitly opted into
      smart features. The workaround of catching the error in the caller exists but
      the exception is unhandled at the LLM feature level.
    file: "src/to_markdown/smart/clean.py"
    line: 79
    confidence: 95
    suggestedFix: >
      Replace str.format() with string concatenation to avoid parsing content
      as a format string. Split the prompt constant into a prefix that uses
      .format() for format_type only, and append content separately:

      def _build_clean_prompt(chunk: str, format_type: str) -> str:
          prefix = CLEAN_PROMPT_PREFIX.format(format_type=format_type)
          return f"{prefix}\n{chunk}"

      Or use a safer interpolation method like string.Template or f-strings
      where the content variable is not subject to format parsing. Apply the
      same fix to SUMMARY_PROMPT usage in summary.py lines 30 and 69.
    codeSnippet: >
      return CLEAN_PROMPT.format(format_type=format_type, content=chunk)

  - category: "code-quality"
    severity: "medium"
    title: "Pending tasks leak permanently if spawn_worker fails"
    description: >
      In worker.py spawn_worker (line 43), if subprocess.Popen raises an exception
      (e.g., OSError from resource exhaustion), the task created by store.create()
      at the caller site remains in "pending" status with no PID. The orphan
      detector check_orphans() in tasks.py line 233 only queries tasks with status
      "running", so it never finds stuck pending tasks. The cleanup() method only
      removes tasks in terminal states (completed/failed/cancelled). A pending task
      with no worker process is never detected, never cleaned up, and accumulates
      in the SQLite database indefinitely.
    why: >
      Each failed spawn leaves an orphaned database row that is never cleaned up.
      Over time, these accumulate in the task store. Users running --status all
      will see phantom pending tasks that never complete, with no way to remove
      them other than manually editing the SQLite database.
    file: "src/to_markdown/core/tasks.py"
    line: 233
    confidence: 85
    suggestedFix: >
      Extend check_orphans to also detect stale pending tasks. A pending task
      with no PID (or a stale PID) that was created more than a few minutes ago
      is likely orphaned:

      # Also check pending tasks with no PID that are stale
      cursor2 = self._conn.execute(
          "SELECT id FROM tasks WHERE status = ? AND pid IS NULL AND created_at < ?",
          (TaskStatus.PENDING.value, _minutes_ago_iso(5)),
      )
      for (task_id,) in cursor2.fetchall():
          self.update(
              task_id,
              status=TaskStatus.FAILED.value,
              error="Worker process never started",
              completed_at=now,
          )
          orphaned += 1

      Alternatively, wrap the spawn_worker call in handle_background with
      try/except that updates the task to failed status on spawn failure.
    codeSnippet: >
      cursor = self._conn.execute(
          "SELECT id, pid FROM tasks WHERE status = ?",
          (TaskStatus.RUNNING.value,),
      )
