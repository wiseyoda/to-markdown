findings:
  - category: "dependencies"
    severity: "low"
    title: "Undeclared pydantic dependency in [mcp] extras"
    description: >
      The file src/to_markdown/mcp/server.py imports `from pydantic import Field`
      at line 8 as a top-level import. However, pydantic is not declared as a
      direct dependency in pyproject.toml — neither in core dependencies nor in
      the [mcp] optional extras. It is available only as a transitive dependency
      of the mcp package (mcp 1.26.0 depends on pydantic 2.12.5, confirmed in
      uv.lock).
    why: >
      Relying on a transitive dependency for a direct import means the project's
      dependency contract is incomplete. If a future version of the mcp package
      made pydantic optional, vendored it, or switched validation libraries, the
      import would break without any change to to-markdown's own dependency
      declarations. Declaring it explicitly makes the requirement visible to
      dependency solvers and protects against upstream restructuring.
    file: "src/to_markdown/mcp/server.py"
    line: 8
    confidence: 80
    suggestedFix: >
      Add pydantic to the [mcp] optional extras in pyproject.toml:

      [project.optional-dependencies]
      mcp = [
        "mcp>=1.26,<2",
        "pydantic>=2.0",
      ]
    codeSnippet: >
      from pydantic import Field
