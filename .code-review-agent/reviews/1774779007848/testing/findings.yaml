findings:
  - category: "testing"
    severity: "medium"
    title: "Missing test for run_worker with nonexistent task ID"
    description: >
      The run_worker() function in worker.py handles the case where
      store.get(task_id) returns None by logging an error and returning
      early at lines 69-71. No test in test_worker.py or any other test
      file exercises this early-return path. All TestRunWorker and
      TestRunWorkerBatch tests create a valid task before calling
      run_worker, so the None branch is never reached.
    why: >
      If someone refactored run_worker to remove the None guard or
      proceeded past it, the function would crash with an AttributeError
      on task.command_args. This path is reachable when a task is deleted
      between spawn and worker execution (cleanup race), or if the
      worker receives a stale/invalid task ID. Without a test, this
      defensive check could be silently removed during refactoring.
    file: "src/to_markdown/core/worker.py"
    line: 69
    confidence: 92
    suggestedFix: >
      Add a test to TestRunWorker in test_worker.py:

      def test_nonexistent_task_returns_gracefully(self, store, store_dir):
          from to_markdown.core.worker import run_worker
          # Call with a task ID that doesn't exist in the store
          run_worker("nonexistent-id", store)
          # Should return without error; no task should be created
          assert store.get("nonexistent-id") is None
    codeSnippet: >
      task = store.get(task_id)
      if task is None:
          logger.error("Task %s not found", task_id)
          return

  - category: "testing"
    severity: "medium"
    title: "Background worker batch failure path never exercised by tests"
    description: >
      In run_worker() at worker.py lines 129-138, when convert_batch()
      returns a BatchResult with non-empty failed list, the worker sets
      status to TASK_STATUS_FAILED and composes an error string from the
      failure details. No test in test_worker.py or
      test_fix_background_batch.py exercises this branch — all batch
      worker tests (TestRunWorkerBatch.test_directory_input_calls_convert_batch
      and test_run_worker_handles_glob_batch) mock convert_batch to return
      successful results with empty failed lists.
    why: >
      When a user runs a background batch conversion and some files fail,
      they check --status to see the outcome. The failure status and error
      details are set in this untested branch. If someone accidentally
      removed the if-result.failed check, background batch failures would
      be silently reported as COMPLETED with no error details, giving
      users a false sense of success.
    file: "src/to_markdown/core/worker.py"
    line: 129
    confidence: 92
    suggestedFix: >
      Add a test to TestRunWorkerBatch in test_worker.py:

      @patch("to_markdown.core.batch.convert_batch")
      @patch("to_markdown.core.batch.discover_files")
      def test_batch_with_failures_marks_task_failed(
          self, mock_discover, mock_batch, store, store_dir
      ):
          from to_markdown.core.batch import BatchResult
          from to_markdown.core.tasks import TaskStatus
          from to_markdown.core.worker import run_worker

          mock_discover.return_value = [Path("/docs/a.pdf"), Path("/docs/b.pdf")]
          mock_batch.return_value = BatchResult(
              succeeded=[Path("/docs/a.md")],
              failed=[(Path("/docs/b.pdf"), "extraction failed")],
              skipped=[],
          )
          task = store.create(
              "/path/to/docs",
              command_args=json.dumps({
                  "input_path": "/path/to/docs",
                  "is_batch": True,
              }),
          )
          run_worker(task.id, store)
          fetched = store.get(task.id)
          assert fetched.status == TaskStatus.FAILED
          assert "b.pdf" in fetched.error
          assert "extraction failed" in fetched.error
    codeSnippet: >
      if result.failed:
          status = TASK_STATUS_FAILED
          error = "\n".join([f"{path.name}: {err}" for path, err in result.failed])

      store.update(
          task_id,
          status=status,
          output_path=output_str,
          error=error,
          completed_at=_now_iso(),
      )
