findings:
  - category: "documentation"
    severity: "low"
    title: "INSTALL.md example output does not match actual installer step text"
    description: >
      INSTALL.md line 72 shows the example terminal output as "[2/7] Checking Python 3.13+"
      but the actual install.sh script at line 66 outputs "[2/7] Checking Python 3.14+".
      A user following the INSTALL.md guide would see different step text than what the
      documentation previews. The installer checks for Python 3.14+ first and only falls
      back to 3.13 if 3.14 is unavailable, so the step label "3.14+" reflects the actual
      check, while the documented example says "3.13+".
    why: >
      A non-technical user following the installation guide may worry they have the wrong
      version of the installer or that something went wrong, since the terminal output
      differs from the documented preview. This undermines the purpose of including example
      output in the first place — to set expectations.
    file: "INSTALL.md"
    line: 72
    confidence: 95
    suggestedFix: >
      Change INSTALL.md line 72 from:
        [2/7] Checking Python 3.13+
      to:
        [2/7] Checking Python 3.14+
      to match what install.sh actually outputs. Alternatively, change install.sh line 66
      to say "Checking Python 3.13+" to match the project's actual minimum requirement
      in pyproject.toml (requires-python = ">=3.13").
    codeSnippet: >
      [2/7] Checking Python 3.13+
        OK Python 3.14.3 found

  - category: "documentation"
    severity: "medium"
    title: "Setup wizard suggests --clean explicitly after API key makes it automatic"
    description: >
      In src/to_markdown/core/setup.py line 195, the _print_next_steps() function shows
      "to-markdown file.pdf --clean      Fix extraction artifacts" as a suggested command
      after the user has just configured their GEMINI_API_KEY via the --setup wizard.
      However, per cli.py lines 162-164, clean is enabled by default when the API key is
      set: `effective_clean = clean or (not no_clean and _is_llm_available())`. The README
      correctly states "Content cleaning runs automatically when GEMINI_API_KEY is set."
      The wizard's suggestion contradicts this by implying --clean must be passed explicitly.
    why: >
      A first-time user who just completed setup will believe --clean is required to get
      content cleaning, when it already happens automatically. This creates a wrong mental
      model of the tool's core feature. Users may always pass --clean unnecessarily, and
      won't understand the --no-clean flag's purpose since they think clean is opt-in
      rather than opt-out.
    file: "src/to_markdown/core/setup.py"
    line: 195
    confidence: 90
    suggestedFix: >
      Replace the --clean line in _print_next_steps with a --no-clean example or a note
      about automatic cleaning. For example:

        "Try these commands:\n\n"
        "  [cyan]to-markdown file.pdf[/cyan]              Convert with auto-clean\n"
        "  [cyan]to-markdown file.pdf --no-clean[/cyan]   Skip LLM cleaning\n"
        "  [cyan]to-markdown file.pdf --summary[/cyan]    Add AI summary\n"
        "  [cyan]to-markdown file.pdf --images[/cyan]     Describe images\n"
        "  [cyan]to-markdown docs/[/cyan]                 Convert a directory"
    codeSnippet: >
      "Try these commands:\n\n"
      "  [cyan]to-markdown file.pdf[/cyan]              Convert a file\n"
      "  [cyan]to-markdown file.pdf --clean[/cyan]      Fix extraction artifacts\n"
      "  [cyan]to-markdown file.pdf --summary[/cyan]    Add AI summary\n"
      "  [cyan]to-markdown file.pdf --images[/cyan]     Describe images\n"
      "  [cyan]to-markdown docs/[/cyan]                 Convert a directory"
