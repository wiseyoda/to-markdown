findings:
  - category: "architecture"
    severity: "medium"
    title: "LLM availability check duplicated across 4 modules"
    description: >
      The same SDK-importability check (try import google.genai, return bool) is
      independently defined in four separate files: cli.py:44 as _is_llm_available(),
      mcp/tools.py:182 as _check_llm_available(), mcp/background_tools.py:22 as
      _check_llm_available(), and core/setup.py:64 as _check_llm_available().
      Additionally, _validate_llm_flags() is identically defined in both
      mcp/tools.py:192 and mcp/background_tools.py:32 despite tools.py already
      importing from background_tools.py (line 16). The import path between
      these two files already exists, making the duplication especially unnecessary.
    why: >
      Changing the LLM provider (e.g. switching from google-genai to another SDK)
      requires updating four files instead of one. The _validate_llm_flags
      duplication means any change to validation error messages or logic must be
      synchronized across two files within the same mcp/ package. This increases
      the cost of LLM-related changes and risks silent divergence if one copy is
      updated and another is missed.
    file: "src/to_markdown/mcp/background_tools.py"
    line: 22
    confidence: 95
    suggestedFix: >
      Consolidate the SDK availability check into a single shared location.
      A natural home is smart/llm.py, which already owns the Gemini client
      lifecycle. Add a function there:

        def is_llm_available() -> bool:
            try:
                import google.genai
                return True
            except ImportError:
                return False

      Then import it in cli.py, setup.py, mcp/tools.py, and
      mcp/background_tools.py. For _validate_llm_flags, either import the
      single copy from background_tools.py into tools.py (since that import
      path already exists), or move it to a shared mcp utility module.
    codeSnippet: |
      # mcp/background_tools.py:22-29
      def _check_llm_available() -> bool:
          """Check if google-genai SDK is importable."""
          try:
              import google.genai  # noqa: F401
              return True
          except ImportError:
              return False

      # mcp/tools.py:182-189 (identical copy)
      def _check_llm_available() -> bool:
          """Check if google-genai SDK is importable."""
          try:
              import google.genai  # noqa: F401
              return True
          except ImportError:
              return False

  - category: "architecture"
    severity: "medium"
    title: "Task cancellation business logic duplicated between CLI and MCP layers"
    description: >
      The task cancellation operation (look up task, check terminal state,
      send SIGTERM to worker PID, update status to cancelled) is implemented
      independently in core/background.py:88 (handle_cancel) and
      mcp/background_tools.py:147 (handle_cancel_task). Both functions
      perform identical business logic: get task from store, check is_done,
      os.kill(pid, SIGTERM) with contextlib.suppress, import TaskStatus and
      _now_iso from tasks, then store.update with CANCELLED status. The CLI
      version formats output via typer.echo/typer.Exit while the MCP version
      returns a string. The business logic is entangled with presentation
      concerns in core/background.py, which prevented the MCP layer from
      reusing it.
    why: >
      If cancellation semantics change (e.g. adding a grace period, changing
      the signal, adding cleanup of output files), both implementations must
      be updated in lockstep. The root cause is that core/background.py mixes
      domain logic (task lookup, signal sending, status update) with CLI
      presentation (typer.echo, typer.Exit), making the business logic
      non-reusable from the MCP context. This same pattern applies to
      handle_status and handle_background, which also embed typer calls.
    file: "src/to_markdown/core/background.py"
    line: 88
    confidence: 85
    suggestedFix: >
      Extract the pure cancellation logic into a shared function in
      core/tasks.py (which already owns the TaskStore) that returns
      a result rather than performing I/O:

        def cancel_task(task_id: str, store: TaskStore) -> tuple[bool, str]:
            task = store.get(task_id)
            if task is None:
                return False, f"Task not found: {task_id}"
            if task.is_done:
                return True, f"Task {task.id} already {task.status.value}"
            if task.pid is not None:
                with contextlib.suppress(OSError, ProcessLookupError):
                    os.kill(task.pid, signal.SIGTERM)
            store.update(task.id, status=TaskStatus.CANCELLED.value, completed_at=_now_iso())
            return True, f"Cancelled task {task.id}"

      Then have both handle_cancel (CLI) and handle_cancel_task (MCP) call
      this shared function and format the output for their respective contexts.
    codeSnippet: |
      # core/background.py:88-113
      def handle_cancel(cancel_id: str, store: "TaskStore") -> None:
          run_maintenance(store)
          task = store.get(cancel_id)
          if task is None:
              typer.echo(f"Task not found: {cancel_id}")
              raise typer.Exit(EXIT_ERROR)
          if task.is_done:
              typer.echo(f"Task {task.id} already {task.status.value}")
              raise typer.Exit(EXIT_SUCCESS)
          if task.pid is not None:
              with contextlib.suppress(OSError, ProcessLookupError):
                  os.kill(task.pid, signal.SIGTERM)
          from to_markdown.core.tasks import TaskStatus, _now_iso
          store.update(task.id, status=TaskStatus.CANCELLED.value, completed_at=_now_iso())

      # mcp/background_tools.py:147-170 (same logic, different output)
      def handle_cancel_task(task_id: str) -> str:
          store = _get_task_store()
          task = store.get(task_id)
          if task is None:
              raise ValueError(f"Task not found: {task_id}")
          if task.is_done:
              return f"Task {task.id} already {task.status.value}"
          if task.pid is not None:
              with contextlib.suppress(OSError, ProcessLookupError):
                  os.kill(task.pid, signal.SIGTERM)
          from to_markdown.core.tasks import TaskStatus, _now_iso
          store.update(task.id, status=TaskStatus.CANCELLED.value, completed_at=_now_iso())
