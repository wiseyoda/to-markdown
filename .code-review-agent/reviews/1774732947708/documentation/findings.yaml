findings:
  - category: "documentation"
    severity: "high"
    title: "INSTALL.md example output shows wrong version 0.1.0 instead of 1.0.0"
    description: >
      The example terminal output in INSTALL.md line 82 shows
      "OK to-markdown 0.1.0" for the installation validation step.
      The actual project version is 1.0.0 as defined in pyproject.toml
      line 3 and src/to_markdown/__init__.py line 3.
    why: >
      A user following the installation guide will see "to-markdown 1.0.0"
      in their terminal but the documentation shows "0.1.0". This version
      mismatch may cause the user to think their installation is broken
      or that they installed the wrong version.
    file: "INSTALL.md"
    line: 82
    confidence: 95
    suggestedFix: >
      Change line 82 from:
        OK to-markdown 0.1.0
      to:
        OK to-markdown 1.0.0
    codeSnippet: >
      [5/7] Validating installation
        OK to-markdown 0.1.0

  - category: "documentation"
    severity: "high"
    title: "INSTALL.md claims Python 3.13 fallback works but project requires >=3.14"
    description: >
      INSTALL.md line 163 states "The installer will automatically try
      Python 3.13 as a fallback" as a resolution for the "Python 3.14
      not available" troubleshooting scenario. However, pyproject.toml
      line 6 declares requires-python = ">=3.14". The install script
      (install.sh lines 79-81) does attempt to install Python 3.13,
      but the subsequent uv sync step (line 116) will fail because the
      project's Python version constraint rejects 3.13.
    why: >
      A user on a platform where Python 3.14 is not yet available will
      read this troubleshooting advice, believe the 3.13 fallback is a
      valid path, and end up with a broken installation when uv sync
      fails. The documentation presents a dead-end workaround as a
      working solution.
    file: "INSTALL.md"
    line: 163
    confidence: 88
    suggestedFix: >
      Either remove the Python 3.13 fallback claim and state that
      Python 3.14+ is strictly required:

        ### "Python 3.14 not available"

        **Cause**: Python 3.14 hasn't been released for your platform yet.

        **Fix**: Wait for Python 3.14 availability on your platform, or
        install it manually from https://www.python.org/downloads/.

      Or, if the intent is to support 3.13, update pyproject.toml to
      requires-python = ">=3.13" and also update the install script
      fallback message accordingly.
    codeSnippet: >
      ### "Python 3.14 not available"

      **Cause**: Python 3.14 hasn't been released for your platform yet.

      **Fix**: The installer will automatically try Python 3.13 as a fallback.

  - category: "documentation"
    severity: "medium"
    title: "CHANGELOG.md release URL uses different GitHub org than README badges"
    description: >
      CHANGELOG.md line 77 links to
      https://github.com/ppatterson/to-markdown/releases/tag/v1.0.0
      while README.md lines 3-4 link badges to
      https://github.com/wiseyoda/to-markdown. These reference different
      GitHub organizations/users for the same project.
    why: >
      One of the two URLs is incorrect. A developer clicking the v1.0.0
      release link in the CHANGELOG will either get a 404 or land on the
      wrong repository. This undermines trust in the documentation and
      makes it unclear which GitHub URL is canonical.
    file: "CHANGELOG.md"
    line: 77
    confidence: 92
    suggestedFix: >
      Align the CHANGELOG release URL with the README. If the canonical
      repo is wiseyoda/to-markdown, change CHANGELOG.md line 77 to:

        [1.0.0]: https://github.com/wiseyoda/to-markdown/releases/tag/v1.0.0

      If the canonical repo is ppatterson/to-markdown, update the
      README badge URLs instead.
    codeSnippet: >
      [1.0.0]: https://github.com/ppatterson/to-markdown/releases/tag/v1.0.0

  - category: "documentation"
    severity: "medium"
    title: "frontmatter.py docstring incorrectly says 'LLM sanitizer' for character-level sanitization"
    description: >
      The compose_frontmatter docstring at src/to_markdown/core/frontmatter.py
      line 22 describes the sanitized parameter as "Whether the content was
      cleaned by the LLM sanitizer." The actual sanitization is performed by
      src/to_markdown/core/sanitize.py which is a character-level filter that
      strips zero-width, control, and directional Unicode characters. No LLM
      is involved. The caller in content_builder.py line 63 sets sanitized
      from sanitize_result.was_modified, which comes from the character-level
      sanitize_content() function.
    why: >
      A developer reading this docstring would believe the sanitized flag
      indicates LLM processing occurred, when it actually indicates
      character-level filtering. This could lead to incorrect assumptions
      about when the flag is set (e.g., assuming it requires GEMINI_API_KEY)
      and about the nature of the transformation applied to the content.
    file: "src/to_markdown/core/frontmatter.py"
    line: 22
    confidence: 95
    suggestedFix: >
      Change the docstring from:
        sanitized: Whether the content was cleaned by the LLM sanitizer.
      to:
        sanitized: Whether non-visible characters were stripped by content sanitization.
