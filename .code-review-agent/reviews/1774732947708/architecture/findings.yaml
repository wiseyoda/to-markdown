findings:
  - category: "architecture"
    severity: "medium"
    title: "Duplicated LLM availability checks across 4 modules"
    description: >
      The function _check_llm_available() (or its variant _is_llm_available()) is
      independently defined in 4 separate files: cli.py:44, core/setup.py:64,
      mcp/tools.py:182, and mcp/background_tools.py:22. Three of these are byte-for-byte
      identical (setup.py, tools.py, background_tools.py). Additionally,
      _validate_llm_flags() is identically defined in both mcp/tools.py:192 and
      mcp/background_tools.py:32 — despite tools.py already importing 5 symbols from
      background_tools.py at line 16, making it trivial to share.
    why: >
      Six independent copies of two utility functions means a change to LLM availability
      logic (e.g., supporting a second LLM provider, changing the SDK import path, or
      modifying environment variable names) requires updating 4-6 locations. Forgetting
      one creates a silent behavioral divergence between CLI, MCP, and setup code paths
      that would be difficult to diagnose.
    file: "src/to_markdown/mcp/tools.py"
    line: 182
    confidence: 95
    suggestedFix: >
      Create a single _check_llm_available() in core/cli_helpers.py (or a new
      core/llm_utils.py) and import it in all four consumers. For _validate_llm_flags(),
      remove the copy in mcp/tools.py and import it from mcp/background_tools.py, which
      tools.py already imports from:

        # In mcp/tools.py, add to existing import block at line 16:
        from to_markdown.mcp.background_tools import (
            _check_llm_available,
            _get_task_store,
            _validate_llm_flags,
            handle_cancel_task,
            handle_get_task_status,
            handle_list_tasks,
            handle_start_conversion,
        )
        # Then delete the local _check_llm_available (lines 182-189)
        # and _validate_llm_flags (lines 192-209) definitions.
    codeSnippet: >
      # mcp/tools.py:182-189 — identical copy
      def _check_llm_available() -> bool:
          """Check if google-genai SDK is importable."""
          try:
              import google.genai  # noqa: F401
              return True
          except ImportError:
              return False

  - category: "architecture"
    severity: "low"
    title: "Private function _now_iso imported across 3 module boundaries"
    description: >
      The function _now_iso() in core/tasks.py (line 93) is prefixed with an underscore,
      marking it as module-private per Python convention. However, it is imported by three
      external modules: core/background.py:101, core/worker.py:19, and
      mcp/background_tools.py:163. This makes _now_iso a de facto public cross-module
      utility while its name signals it is an internal implementation detail.
    why: >
      A developer refactoring tasks.py could reasonably rename or remove _now_iso()
      believing it is internal-only, which would break three other modules with no
      static analysis warning. The underscore prefix also prevents IDE autocompletion
      for legitimate consumers, reducing discoverability.
    file: "src/to_markdown/core/tasks.py"
    line: 93
    confidence: 95
    suggestedFix: >
      Rename _now_iso to now_iso (drop the underscore) to reflect its actual usage as
      a public utility. Alternatively, move it to core/constants.py or a small
      core/time_utils.py module if you want to signal it is a shared helper:

        # In core/tasks.py, rename:
        def now_iso() -> str:
            """Current UTC time as ISO 8601 string."""
            return datetime.now(UTC).isoformat()

        # Update imports in background.py, worker.py, background_tools.py:
        from to_markdown.core.tasks import TaskStatus, now_iso
    codeSnippet: >
      def _now_iso() -> str:
          """Current UTC time as ISO 8601 string."""
          return datetime.now(UTC).isoformat()
